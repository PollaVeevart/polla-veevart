<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pronóstico Selección Colombia</title>

<style>
body{
  font-family: Arial, sans-serif;
  padding:20px;
}

input, select, button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
}

button{
  background:#1c8c3a;
  color:white;
  border:none;
  cursor:pointer;
  font-size:16px;
}

button:hover{
  opacity:0.8;
}

#mensaje{
  margin-top:15px;
  font-weight:bold;
}
</style>

</head>

<body>

<h2>🇨🇴 Pronóstico Selección Colombia</h2>

<form id="formulario">

<label>Nombre:</label>
<input id="nombre" type="text" required>


<label>Marcador Colombia:</label>
<input id="colombia" type="number" required>


<label>Marcador Suiza:</label>
<input id="suiza" type="number" required>


<button type="submit">
Enviar pronóstico
</button>

</form>


<div id="mensaje"></div>


<script>

const URL = const URL = "https://script.google.com/macros/s/AKfycbzn7iCXGjTme-2VrZd0Z_2oTzC74_Zuj7m1Sb3YWuFRtlFdSQuVmZ7oRmnppXbWQ6iP0A/exec";


const formulario = document.getElementById("formulario");
const mensaje = document.getElementById("mensaje");


formulario.addEventListener("submit", async function(e){

e.preventDefault();


const nombre = document.getElementById("nombre").value;
const colombia = document.getElementById("colombia").value;
const suiza = document.getElementById("suiza").value;


mensaje.innerHTML="⏳ Enviando...";


try{


const respuesta = await fetch(URL,{
method:"POST",
headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

nombre:nombre,
colombia:colombia,
suiza:suiza

})

});


const resultado = await respuesta.json();


console.log(resultado);


if(resultado.status !== "ok"){

throw new Error(resultado.message);

}


mensaje.innerHTML="✅ ¡Pronóstico registrado correctamente!";


formulario.reset();


}

catch(error){


console.error(error);

mensaje.innerHTML="❌ Error al enviar: "+error.message;


}


});


</script>


</body>
</html>
